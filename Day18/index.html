<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập về nhà buổi 18</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- <h1 style="text-align: center">Bài tập về nhà buổi 18</h1> -->
    <div class="container">
      <section id="ex01" class="card">
        <h2>Hiện thị n số fibonacci đầu tiên</h2>
        <div class="form-group">
          <label>Nhập n</label>
          <input type="number" id="b1_number" />
        </div>
        <button class="btn btn-1">Action</button>
        <p class="result" id="b1_result"></p>
      </section>
      <section id="ex02" class="card">
        <h2>Đảo ngược số</h2>
        <div class="form-group">
          <label>Nhập số muốn đảo ngược</label>
          <input type="number" id="b2_number" />
        </div>
        <button class="btn btn-2">Action</button>
        <p class="result" id="b2_result"></p>
      </section>
      <section id="ex03" class="card">
        <h2>Hàm chuyển số thành chữ</h2>
        <div class="form-group">
          <label>Nhập số</label>
          <input type="number" id="b3_number" min="0" max="9999" />
        </div>
        <button class="btn btn-3">Action</button>
        <p class="result" id="b3_result"></p>
      </section>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
