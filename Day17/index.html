<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập ngày 17</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h1 style="text-align: center; margin-bottom: 40px">
      Bài tập về nhà ngày 17
    </h1>
    <main class="container">
      <section id="ex01" class="card">
        <h3>Bài 1: Hoán vị 2 số</h3>
        <div class="form-group">
          <label>Số A</label>
          <input type="number" id="b1_a" />
        </div>
        <div class="form-group">
          <label>Số B</label>
          <input type="number" id="b1_b" />
        </div>
        <button class="btn btn-1">Action</button>
        <p class="result" id="b1_result"></p>
      </section>
      <section id="ex02" class="card">
        <h3>Bài 2: Tìm số lớn nhất</h3>
        <div class="form-group">
          <label>Số A</label>
          <input type="number" id="b2_a" />
        </div>
        <div class="form-group">
          <label>Số B</label>
          <input type="number" id="b2_b" />
        </div>
        <div class="form-group">
          <label>Số C</label>
          <input type="number" id="b2_c" />
        </div>
        <button class="btn btn-2">Action</button>
        <p class="result" id="b2_result"></p>
      </section>
      <section id="ex03" class="card">
        <h3>Bài 3: Kiểm tra số cùng dấu</h3>
        <div class="form-group">
          <label>Số A</label>
          <input type="number" id="b3_a" />
        </div>
        <div class="form-group">
          <label>Số B</label>
          <input type="number" id="b3_b" />
        </div>
        <button class="btn btn-3">Action</button>
        <p class="result" id="b3_result"></p>
      </section>
      <section id="ex04" class="card">
        <h3>Bài 4: Sắp xếp 3 số</h3>
        <div class="form-group">
          <label>Số A</label>
          <input type="number" id="b4_a" />
        </div>
        <div class="form-group">
          <label>Số B</label>
          <input type="number" id="b4_b" />
        </div>
        <div class="form-group">
          <label>Số C</label>
          <input type="number" id="b4_c" />
        </div>
        <button class="btn btn-4">Action</button>
        <p class="result" id="b4_result"></p>
      </section>
      <section id="ex05" class="card">
        <h3>Bài 5: Tính tiền taxi</h3>
        <div class="form-group">
          <input type="number" id="b5_index" step="0.5" />
        </div>
        <button class="btn btn-5">Action</button>
        <p class="result" id="b5_result"></p>
      </section>
      <section id="ex06" class="card">
        <h3>Bài 6: Tính tiền điện</h3>
        <div class="form-group">
          <input type="number" id="b6_index" step="0.1" />
        </div>
        <button class="btn btn-6">Action</button>
        <p class="result" id="b6_result"></p>
      </section>
      <section id="ex07" class="card">
        <h3>Bài 7: Tính giá trị biểu thức</h3>
        <pre style="font-size: 18px">S = 1*2 + 2*3 + 3*4 + ... + n*(n+1)</pre>
        <div class="form-group">
          <label>Nhập n</label>
          <input type="number" id="b7_number" />
        </div>
        <button class="btn btn-7">Action</button>
        <p class="result" id="b7_result"></p>
      </section>
      <section id="ex08" class="card">
        <h3>Bài 8: Kiểm tra số nguyên tố</h3>
        <div class="form-group">
          <label>Nhập n</label>
          <input type="number" id="b8_number" />
        </div>
        <button class="btn btn-8">Action</button>
        <p class="result" id="b8_result"></p>
      </section>
      <section id="ex09" class="card">
        <h3>Bài 9: Vẽ bảng cửu chương</h3>
        <button class="btn btn-9">Action</button>
        <div class="result" id="b9_result"></div>
      </section>
    </main>
    <script src="js/script.js"></script>
  </body>
</html>
